# Anima Configuration
# Copy this file to config.yaml and fill in your values.

server:
  host: uo.hulryung.com
  port: 2593

account:
  username: your_username
  password: your_password

character:
  name: Anima
  # 캐릭터가 없을 때 자동 생성 시 사용할 설정
  # template: random, warrior, mage, smith, merchant, ranger
  template: random
  # 시작 도시: 0=New Haven, 3=Britain
  city_index: 3
  # 페르소나: adventurer, blacksmith, merchant, mage, bard, ranger
  persona: adventurer

client:
  version: "7.0.102.3"
  connection_timeout: 10.0

movement:
  walk_delay_ms: 400
  run_delay_ms: 200
  turn_delay_ms: 100

map:
  resource_dir: ~/dev/uo/uo-resource

llm:
  # provider: ollama | openai | anthropic | replicate | custom
  provider: replicate
  model: deepseek-ai/deepseek-v3.1
  api_key: ""  # REPLICATE_API_KEY (or set via env var)
  # For Ollama (local):
  #   provider: ollama
  #   model: qwen3:8b
  #   base_url: http://localhost:11434
  temperature: 0.7
  timeout: 30.0

memory:
  db_path: data/anima.db
  max_episodes: 10000
  retrieval_count: 5

forum:
  enabled: false
  base_url: https://www.uotavern.com/api
  api_key: ""  # agent API key from uotavern admin
  post_interval: 3600    # 1시간마다 포스팅
  read_interval: 1800    # 30분마다 포럼 읽기
